<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <script src="../js/data.js"></script>
    <script src="../js/lib.js"></script>
    <style>
        body { background: #f5f5f5; font-family: Arial, sans-serif; }
        .container { max-width: 500px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; }
        h2 { color: #e94560; }
        #price { color: #f5a623; font-weight: bold; font-size: 1.2rem; }
        #desc { color: #666; }
        a { color: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <img src="" alt="" id="img">
        <div class="info">
            <h2 id="name">Tên sản phẩm</h2>
            <p id="price">Giá</p>
            <p id="desc">Mô tả</p>
            <button onclick="alert('Đã mua')" style="display:inline-block; padding:8px 20px; background:#e94560; color:white; border-radius:20px; text-decoration:none; font-weight:bold; font-size:0.85rem;">Mua ngay</button>
            <button onclick="alert('Đã thêm vào giỏ!')" style="display:inline-block; padding:8px 20px; background:#e94560; color:white; border-radius:20px; text-decoration:none; font-weight:bold; font-size:0.85rem;">Thêm giỏ hàng</button>
            <a href="sanphamv2.html">← Quay lại</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('masp');
        let found = products.find(item => item.id == productId);
        if(found) {
            document.getElementById("name").innerHTML = found.names;
            document.getElementById("price").innerHTML = found.price;
            document.getElementById("desc").innerHTML = found.description;
            document.getElementById("img").src = found.image;
            document.getElementById("img").alt = found.names;
        }
    </script>
</body>
</html>
